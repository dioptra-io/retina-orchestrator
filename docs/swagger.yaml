definitions:
  api.ICMPNextHeader:
    properties:
      first_half_word:
        type: integer
      second_half_word:
        type: integer
    type: object
  api.ICMPv6NextHeader:
    properties:
      first_half_word:
        type: integer
      second_half_word:
        type: integer
    type: object
  api.IPVersion:
    enum:
    - 4
    - 6
    format: int32
    type: integer
    x-enum-varnames:
    - TypeIPv4
    - TypeIPv6
  api.NextHeader:
    properties:
      icmp_next_header:
        allOf:
        - $ref: '#/definitions/api.ICMPNextHeader'
        description: ICMPNextHeader is set when Protocol == ICMP.
      icmpv6_next_header:
        allOf:
        - $ref: '#/definitions/api.ICMPv6NextHeader'
        description: ICMPNextHeader is set when Protocol == ICMPv6.
      udp_next_header:
        allOf:
        - $ref: '#/definitions/api.UDPNextHeader'
        description: ICMPNextHeader is set when Protocol == UDP.
    type: object
  api.ProbingDirective:
    properties:
      agent_id:
        description: AgentID identifies the agent that should execute this directive.
        type: string
      destination_address:
        description: DestinationAddress is the target IP address to probe.
        items:
          type: integer
        type: array
      ip_version:
        allOf:
        - $ref: '#/definitions/api.IPVersion'
        description: IPVersion selects IPv4 vs IPv6 for the probe packet.
      near_ttl:
        description: NearTTL is the TTL/hop-limit value used for the "near" probe
          (typically close to the destination).
        type: integer
      next_header:
        allOf:
        - $ref: '#/definitions/api.NextHeader'
        description: |-
          NextHeader contains protocol-specific fields needed to craft the packet
          (e.g., UDP ports, ICMP words). Should match Protocol.
      protocol:
        allOf:
        - $ref: '#/definitions/api.Protocol'
        description: Protocol selects the transport protocol used for probing (ICMP/UDP/ICMPv6).
    type: object
  api.Protocol:
    enum:
    - 1
    - 17
    - 58
    format: int32
    type: integer
    x-enum-varnames:
    - ICMP
    - UDP
    - ICMPv6
  api.UDPNextHeader:
    properties:
      destination_port:
        description: DestinationPort is the UDP destination port used in the probe
          packet.
        type: integer
      source_port:
        description: SourcePort is the UDP source port used in the probe packet.
        type: integer
    type: object
info:
  contact: {}
paths:
  /directives:
    post:
      consumes:
      - application/json
      description: Inserts a list of probing directives into the scheduler.
      parameters:
      - description: List of probing directives
        in: body
        name: directives
        required: true
        schema:
          items:
            $ref: '#/definitions/api.ProbingDirective'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Insert probing directives
      tags:
      - scheduler
  /stream:
    get:
      description: Streams ForwardingInfoElement the latest updates to the connected
        clients as SSE.
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
      summary: Stream server-sent events
      tags:
      - stream
swagger: "2.0"
