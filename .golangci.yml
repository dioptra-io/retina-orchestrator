version: "2"

run:
  concurrency: 4
  timeout: 5m
  tests: true

linters:
  enable:
    # correctness & safety
    - govet
    - errcheck
    - staticcheck
    - gosec
    - unconvert
    - ineffassign
    - gocritic
    - nakedret
    - funlen
    - gocyclo
    - prealloc
    - dupl
    - misspell
    - whitespace
    - exhaustive
    - unparam
  settings:
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 80
      statements: 100
    misspell:
      locale: US
    dupl:
      threshold: 100
    gocritic:
      enabled-checks:
        - hugeParam
        - importShadow
        - paramTypeCombine
        - stringXbytes

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

severity:
  errcheck: error
  gocritic: error